name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject Mapbox token
        env:
          MAPBOX_API_TOKEN: ${{ secrets.MAPBOX_API_TOKEN }}
        run: |
          if [ -z "$MAPBOX_API_TOKEN" ]; then
            echo "::error::MAPBOX_API_TOKEN secret is not set"
            exit 1
          fi
          # Replace the placeholder string MAPBOX_API_TOKEN with the secret value
          # in every HTML/JS file. Using a delimiter unlikely to appear in tokens.
          find . -type f \( -name '*.html' -o -name '*.js' \) \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -exec sed -i "s|MAPBOX_API_TOKEN|${MAPBOX_API_TOKEN}|g" {} +

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
